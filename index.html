<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plankton in Lake Matoaka</title>
    <!-- <link rel="icon" href="./assets/logo.png" type="image/png"> -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Handjet:wght,ELSH@100..900,2&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Gemunu+Libre:wght@200..800&display=swap" rel="stylesheet">


    <meta name="referrer" content="no-referrer-when-downgrade">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <div class="hero-image">

        <div class="hero-text">
            <span id="hero-title">The Plankton of Lake Matoaka</span>

            <br />
            <span id="hero-subtitle">A visual gallery and info center</span>
        </div>
    </div>

    <div class="map-container">
        <h2>Map of Sampling Sites</h2>
        <div id="map" class="border"></div>
    </div>


    <div class="gallery-container">
        <h2>Gallery</h2>
        <p>Click each image for additional information</p>
        <div class="modes">
            <button>See each critter</button>
            <button>See all images</button>
        </div>
        <div id="gallery-photos"></div>
        <div id="profile-panel"></div>
        <div id="img-preview" onclick="closePreview()"></div>
    </div>


    <div id="dynamic-lightbox" class="lightbox-overlay" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Large view">
    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
