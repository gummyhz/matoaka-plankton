<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

<body>
    <div class="hero-image">
  
        <div class="hero-text">
            <span id="hero-title">The Plankton of Lake Matoaka</span>

            <span id="hero-title-small">(and some friends)</span>
            <br/>
            <span id="hero-subtitle">A visual gallery and info center</span>
        </div>
    </div>

    <div class="gallery-container">

        <div id="profile-panel"></div>
    </div>


    <div id="dynamic-lightbox" class="lightbox-overlay" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>

    <script src="data.js"></script>
    <script src="script.js"></script>
